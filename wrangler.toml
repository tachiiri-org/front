name = "front"
main = "src/worker.ts"
compatibility_date = "2026-04-23"
workers_dev = false

[assets]
directory = "./dist"
binding = "ASSETS"
run_worker_first = true

[env.stage]
name = "front-stage"
workers_dev = true

[env.stage.observability]
enabled = true

[env.stage.vars]
LOG_LEVEL = "info"
FRONTEND_ORIGIN = "https://front-stage.tachiiri.workers.dev"
GITHUB_OAUTH_CLIENT_ID = "Ov23lihhhvT7GB1IGasP"
GOOGLE_OAUTH_CLIENT_ID = "804252639051-hdkilk1189bomeiv9opnsu0h2basdtr8.apps.googleusercontent.com"
MICROSOFT_OAUTH_CLIENT_ID = "9350aec4-f659-4c8d-a48b-58c195844b09"
LAYOUTS_BUCKET_ID = "bucket-stage"
DEFAULT_ORG_ID = "9c95aa5e-5943-4dd0-9579-ed3725821979"
# Cloudflare Turnstile テストキー（常時パス・可視）。stage は自動化検証を通すため実キーを使わない。
# 実挙動の確認は本番のみ。テストキー: https://developers.cloudflare.com/turnstile/troubleshooting/testing/
TURNSTILE_SITE_KEY = "1x00000000000000000000AA"

[[env.stage.services]]
binding = "BACKEND"
service = "backend-stage"

[env.production]
name = "front-production"
workers_dev = true

[env.production.observability]
enabled = true

[env.production.vars]
LOG_LEVEL = "warn"
FRONTEND_ORIGIN = "https://front-production.tachiiri.workers.dev"
GITHUB_OAUTH_CLIENT_ID = "Ov23li098QXLtF5UbEg5"
GOOGLE_OAUTH_CLIENT_ID = "804252639051-hdkilk1189bomeiv9opnsu0h2basdtr8.apps.googleusercontent.com"
MICROSOFT_OAUTH_CLIENT_ID = "296697e1-f362-44d6-9895-df430f68c55c"
LAYOUTS_BUCKET_ID = "bucket-production"
DEFAULT_ORG_ID = "9c95aa5e-5943-4dd0-9579-ed3725821979"
TURNSTILE_SITE_KEY = "0x4AAAAAAdmeQIwvvS5sJHdN"

[[env.production.services]]
binding = "BACKEND"
service = "backend-production"

[env.dev]
name = "front-dev"
workers_dev = true

[env.dev.observability]
enabled = true

[[env.dev.services]]
binding = "BACKEND"
service = "backend-dev"

[env.dev.vars]
LOG_LEVEL = "debug"
# 秘密は平文 var に置かず worker secret（wrangler secret put --env dev）で注入する。
# dev だけ平文だった FRONT_TO_BACKEND_TOKEN / IDENTITY_ENCRYPTION_KEY / BUILD_SCREENS_TOKEN を
# stage/prod と同様に worker secret 化した（秘密漏えいの是正）。以下 vars は公開値のみ。
GITHUB_OAUTH_CLIENT_ID = "Ov23litfbD8WRrXkM4iR"
GOOGLE_OAUTH_CLIENT_ID = "804252639051-hdkilk1189bomeiv9opnsu0h2basdtr8.apps.googleusercontent.com"
MICROSOFT_OAUTH_CLIENT_ID = "0398ec75-5040-4d01-8508-7aa813f2857c"
LAYOUTS_BUCKET_ID = "bucket-dev"
DEFAULT_ORG_ID = "9c95aa5e-5943-4dd0-9579-ed3725821979"
# Cloudflare Turnstile テストキー（常時パス・可視）。dev は headless/自動化を通すため実キーを使わない。
TURNSTILE_SITE_KEY = "1x00000000000000000000AA"

