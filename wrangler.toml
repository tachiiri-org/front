name = "front"
main = "src/worker.ts"
compatibility_date = "2026-04-23"
workers_dev = false

[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"

[[r2_buckets]]
binding = "LAYOUTS"
bucket_name = "layouts-dev"

[env.dev]
name = "front-dev"
workers_dev = true

[[env.dev.r2_buckets]]
binding = "LAYOUTS"
bucket_name = "layouts-dev"

[[env.production.r2_buckets]]
binding = "LAYOUTS"
bucket_name = "layouts-prod"

[env.production]
workers_dev = false

[env.local]
name = "front-local"
workers_dev = true

[env.local.vars]
LAYOUTS_BUCKET_ID = "bucket-local"
FRONT_TO_AUTHORIZE_TOKEN = "0M3WHY4RVirHPPeiUHbwbkqWH8kL4pgUaUZxbHYEOTQ"
INTERNAL_AUTH_SIGNING_KEY = '{"key_ops":["sign"],"ext":true,"kty":"EC","x":"zXGyZOvOTgwcGdQrUrr2DBGsRJwuUvHLFTZ90CM02_U","y":"CZoC3CzhEdot39TRf-lJrFH76SN2EfVlFF53c7gGMjg","crv":"P-256","d":"RJHEcL766qLh04aZHAoLlcw5PFIRNkkHQPyBR7n0fuU"}'

