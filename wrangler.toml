name = "front"
main = "src/worker.ts"
compatibility_date = "2026-04-23"
workers_dev = false

[assets]
directory = "./dist"
binding = "ASSETS"

[[r2_buckets]]
binding = "LAYOUTS"
bucket_name = "layouts-dev"

[env.stage]
name = "front-stage"
workers_dev = true

[[env.stage.r2_buckets]]
binding = "LAYOUTS"
bucket_name = "layouts-stage"

[env.stage.vars]
FRONTEND_ORIGIN = "https://front-stage.tachiiri.workers.dev"
IDENTIFY_ORIGIN = "https://identify-stage.tachiiri.workers.dev"

[[env.stage.services]]
binding = "IDENTIFY"
service = "identify-stage"

[[env.stage.services]]
binding = "AUTHORIZE"
service = "authorize-stage"

[[env.stage.secrets_store_secrets]]
binding = "FRONT_TO_IDENTIFY_TOKEN"
store_id = "4637b8eeef4d4774a131ba3cf7011234"
secret_name = "FRONT_TO_IDENTIFY_TOKEN_STAGE"

[[env.stage.secrets_store_secrets]]
binding = "FRONT_TO_AUTHORIZE_TOKEN"
store_id = "4637b8eeef4d4774a131ba3cf7011234"
secret_name = "FRONT_TO_AUTHORIZE_TOKEN_STAGE"

[[env.stage.secrets_store_secrets]]
binding = "INTERNAL_AUTH_SIGNING_KEY"
store_id = "4637b8eeef4d4774a131ba3cf7011234"
secret_name = "INTERNAL_AUTH_SIGNING_KEY_STAGE"

[[env.production.r2_buckets]]
binding = "LAYOUTS"
bucket_name = "layouts-prod"

[env.production]
name = "front-prod"
workers_dev = true

[env.production.vars]
FRONTEND_ORIGIN = "https://front-prod.tachiiri.workers.dev"
GITHUB_OAUTH_CLIENT_ID = "Ov23li098QXLtF5UbEg5"

[[env.production.services]]
binding = "IDENTIFY"
service = "identify-prod"

[[env.production.services]]
binding = "AUTHORIZE"
service = "authorize-prod"

[[env.production.secrets_store_secrets]]
binding = "FRONT_TO_IDENTIFY_TOKEN"
store_id = "4637b8eeef4d4774a131ba3cf7011234"
secret_name = "FRONT_TO_IDENTIFY_TOKEN_PROD"

[[env.production.secrets_store_secrets]]
binding = "FRONT_TO_AUTHORIZE_TOKEN"
store_id = "4637b8eeef4d4774a131ba3cf7011234"
secret_name = "FRONT_TO_AUTHORIZE_TOKEN_PROD"

[[env.production.secrets_store_secrets]]
binding = "INTERNAL_AUTH_SIGNING_KEY"
store_id = "4637b8eeef4d4774a131ba3cf7011234"
secret_name = "INTERNAL_AUTH_SIGNING_KEY_PROD"

[env.dev]
name = "front-dev"
workers_dev = true

[env.dev.vars]
FRONTEND_ORIGIN = "http://localhost:8787"
IDENTIFY_ORIGIN = "https://identify-dev.tachiiri.workers.dev"
AUTHORIZE_ORIGIN = "https://authorize-dev.tachiiri.workers.dev"
FRONT_TO_IDENTIFY_TOKEN = "828298b87ee5fdb66350e2ae2892473b139abd3523e189e9c8781b77f94b06ed"
GITHUB_OAUTH_CLIENT_ID = "Ov23litfbD8WRrXkM4iR"
LAYOUTS_BUCKET_ID = "bucket-dev"

[[env.dev.r2_buckets]]
binding = "LAYOUTS"
bucket_name = "layouts-dev"
