name = "front"
main = "src/worker.ts"
compatibility_date = "2026-04-23"
workers_dev = false

[assets]
directory = "./dist"
binding = "ASSETS"

[[r2_buckets]]
binding = "LAYOUTS"
bucket_name = "layouts-dev"

[env.dev]
name = "front-dev"
workers_dev = true

[[env.dev.r2_buckets]]
binding = "LAYOUTS"
bucket_name = "layouts-dev"

[env.dev.vars]
FRONTEND_ORIGIN = "https://front-dev.tachiiri.workers.dev"
IDENTIFY_ORIGIN = "https://identify-dev.tachiiri.workers.dev"

[[env.dev.services]]
binding = "IDENTIFY"
service = "identify-dev"

[[env.dev.services]]
binding = "AUTHORIZE"
service = "authorize-dev"

[[env.dev.secrets_store_secrets]]
binding = "FRONT_TO_IDENTIFY_TOKEN"
store_id = "4637b8eeef4d4774a131ba3cf7011234"
secret_name = "FRONT_TO_IDENTIFY_TOKEN_DEV"

[[env.dev.secrets_store_secrets]]
binding = "FRONT_TO_AUTHORIZE_TOKEN"
store_id = "4637b8eeef4d4774a131ba3cf7011234"
secret_name = "FRONT_TO_AUTHORIZE_TOKEN"

[[env.dev.secrets_store_secrets]]
binding = "INTERNAL_AUTH_SIGNING_KEY"
store_id = "4637b8eeef4d4774a131ba3cf7011234"
secret_name = "INTERNAL_AUTH_SIGNING_KEY_DEV"

[[env.production.r2_buckets]]
binding = "LAYOUTS"
bucket_name = "layouts-prod"

[env.production]
name = "front"
workers_dev = true

[env.production.vars]
FRONTEND_ORIGIN = "https://front.tachiiri.workers.dev"
GITHUB_OAUTH_CLIENT_ID = "Ov23li098QXLtF5UbEg5"

[[env.production.services]]
binding = "IDENTIFY"
service = "identify"

[[env.production.services]]
binding = "AUTHORIZE"
service = "authorize"

[[env.production.secrets_store_secrets]]
binding = "FRONT_TO_IDENTIFY_TOKEN"
store_id = "4637b8eeef4d4774a131ba3cf7011234"
secret_name = "FRONT_TO_IDENTIFY_TOKEN"

[[env.production.secrets_store_secrets]]
binding = "FRONT_TO_AUTHORIZE_TOKEN"
store_id = "4637b8eeef4d4774a131ba3cf7011234"
secret_name = "FRONT_TO_AUTHORIZE_TOKEN"

[[env.production.secrets_store_secrets]]
binding = "INTERNAL_AUTH_SIGNING_KEY"
store_id = "4637b8eeef4d4774a131ba3cf7011234"
secret_name = "INTERNAL_AUTH_SIGNING_KEY"

[env.local]
name = "front-local"
workers_dev = true

[env.local.vars]
FRONTEND_ORIGIN = "http://localhost:8787"
IDENTIFY_ORIGIN = "https://identify-local.tachiiri.workers.dev"
AUTHORIZE_ORIGIN = "https://authorize-local.tachiiri.workers.dev"
FRONT_TO_IDENTIFY_TOKEN = "828298b87ee5fdb66350e2ae2892473b139abd3523e189e9c8781b77f94b06ed"
GITHUB_OAUTH_CLIENT_ID = "Ov23litfbD8WRrXkM4iR"
LAYOUTS_BUCKET_ID = "bucket-local"

[[env.local.r2_buckets]]
binding = "LAYOUTS"
bucket_name = "layouts-dev"

[[env.local.services]]
binding = "AUTHORIZE"
service = "authorize-local"

[[env.local.services]]
binding = "IDENTIFY"
service = "identify-local"

[[env.local.secrets_store_secrets]]
binding = "FRONT_TO_IDENTIFY_TOKEN"
store_id = "4637b8eeef4d4774a131ba3cf7011234"
secret_name = "FRONT_TO_IDENTIFY_TOKEN_DEV"

[[env.local.secrets_store_secrets]]
binding = "FRONT_TO_AUTHORIZE_TOKEN"
store_id = "4637b8eeef4d4774a131ba3cf7011234"
secret_name = "FRONT_TO_AUTHORIZE_TOKEN"

[[env.local.secrets_store_secrets]]
binding = "INTERNAL_AUTH_SIGNING_KEY"
store_id = "4637b8eeef4d4774a131ba3cf7011234"
secret_name = "INTERNAL_AUTH_SIGNING_KEY_DEV"
