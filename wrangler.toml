name = "front"
main = "src/worker.ts"
compatibility_date = "2026-04-23"
workers_dev = false

[assets]
directory = "./dist"
binding = "ASSETS"

[env.stage]
name = "front-stage"
workers_dev = true

[[env.stage.d1_databases]]
binding = "IDENTITY_DB"
database_name = "identity-stage"
database_id = "20dfc9c6-170c-47e7-927c-d703918a6449"

[env.stage.vars]
FRONTEND_ORIGIN = "https://front-stage.tachiiri.workers.dev"
GITHUB_OAUTH_CLIENT_ID = "Ov23li098QXLtF5UbEg5"
GOOGLE_OAUTH_CLIENT_ID = "804252639051-hdkilk1189bomeiv9opnsu0h2basdtr8.apps.googleusercontent.com"
LAYOUTS_BUCKET_ID = "bucket-stage"

[[env.stage.services]]
binding = "BACKEND"
service = "backend-stage"

[env.production]
name = "front-production"
workers_dev = true

[[env.production.d1_databases]]
binding = "IDENTITY_DB"
database_name = "identity-production"
database_id = "01fc4992-e113-435a-be70-226cddcfa092"

[env.production.vars]
FRONTEND_ORIGIN = "https://front-production.tachiiri.workers.dev"
GITHUB_OAUTH_CLIENT_ID = "Ov23li098QXLtF5UbEg5"
GOOGLE_OAUTH_CLIENT_ID = "804252639051-hdkilk1189bomeiv9opnsu0h2basdtr8.apps.googleusercontent.com"
LAYOUTS_BUCKET_ID = "bucket-production"

[[env.production.services]]
binding = "BACKEND"
service = "backend-production"

[env.dev]
name = "front-dev"
workers_dev = true

[[env.dev.d1_databases]]
binding = "IDENTITY_DB"
database_name = "identity-dev"
database_id = "38652751-ca79-47ae-ac3f-92b59088e11e"
remote = true

[[env.dev.services]]
binding = "BACKEND"
service = "backend-dev"

[env.dev.vars]
