name = "front"
main = "src/worker.ts"
compatibility_date = "2026-04-23"
workers_dev = false

[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"

[[r2_buckets]]
binding = "LAYOUTS"
bucket_name = "layouts-dev"

[env.dev]
name = "front-dev"
workers_dev = true

[[env.dev.r2_buckets]]
binding = "LAYOUTS"
bucket_name = "layouts-dev"

[[env.production.r2_buckets]]
binding = "LAYOUTS"
bucket_name = "layouts-prod"

[env.production]
workers_dev = false

[env.local]
name = "front-local"
workers_dev = true

[[env.local.services]]
binding = "AUTHORIZE"
service = "authorize-local"

[[env.local.secrets_store.bindings]]
binding = "FRONT_TO_AUTHORIZE_TOKEN"
store_id = "4637b8eeef4d4774a131ba3cf7011234"
secret_name = "FRONT_TO_AUTHORIZE_TOKEN"

[[env.local.secrets_store.bindings]]
binding = "INTERNAL_AUTH_SIGNING_KEY"
store_id = "4637b8eeef4d4774a131ba3cf7011234"
secret_name = "INTERNAL_AUTH_SIGNING_KEY"
