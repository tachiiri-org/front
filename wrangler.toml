name = "front"
main = "src/worker.ts"
compatibility_date = "2026-04-23"
workers_dev = false

[assets]
directory = "./dist"
binding = "ASSETS"

[[r2_buckets]]
binding = "LAYOUTS"
bucket_name = "layouts-dev"

[env.stage]
name = "front-stage"
workers_dev = true

[[env.stage.r2_buckets]]
binding = "LAYOUTS"
bucket_name = "layouts-stage"

[env.stage.vars]
FRONTEND_ORIGIN = "https://front-stage.tachiiri.workers.dev"

[[env.stage.services]]
binding = "BACKEND"
service = "backend-stage"

[[env.stage.secrets_store_secrets]]
binding = "FRONT_TO_BACKEND_TOKEN"
store_id = "4637b8eeef4d4774a131ba3cf7011234"
secret_name = "FRONT_TO_BACKEND_TOKEN_STAGE"

[[env.stage.secrets_store_secrets]]
binding = "INTERNAL_AUTH_SIGNING_KEY"
store_id = "4637b8eeef4d4774a131ba3cf7011234"
secret_name = "INTERNAL_AUTH_SIGNING_KEY_STAGE"

[env.production]
name = "front-production"
workers_dev = true

[[env.production.r2_buckets]]
binding = "LAYOUTS"
bucket_name = "layouts-prod"

[env.production.vars]
FRONTEND_ORIGIN = "https://front-production.tachiiri.workers.dev"
GITHUB_OAUTH_CLIENT_ID = "Ov23li098QXLtF5UbEg5"

[[env.production.services]]
binding = "BACKEND"
service = "backend-production"

[[env.production.secrets_store_secrets]]
binding = "FRONT_TO_BACKEND_TOKEN"
store_id = "4637b8eeef4d4774a131ba3cf7011234"
secret_name = "FRONT_TO_BACKEND_TOKEN_PROD"

[[env.production.secrets_store_secrets]]
binding = "INTERNAL_AUTH_SIGNING_KEY"
store_id = "4637b8eeef4d4774a131ba3cf7011234"
secret_name = "INTERNAL_AUTH_SIGNING_KEY_PROD"

[env.dev]
name = "front-dev"
workers_dev = true

[env.dev.vars]
FRONTEND_ORIGIN = "http://localhost:8787"
BACKEND_ORIGIN = "https://backend-dev.tachiiri.workers.dev"
FRONT_TO_BACKEND_TOKEN = "b109b22738647033f1ef4ad11426c8a8a05aae7c3ec3da9f88e0ad4dbd768781"
GITHUB_OAUTH_CLIENT_ID = "Ov23litfbD8WRrXkM4iR"
LAYOUTS_BUCKET_ID = "bucket-dev"

[[env.dev.r2_buckets]]
binding = "LAYOUTS"
bucket_name = "layouts-dev"
