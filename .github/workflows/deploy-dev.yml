name: Deploy Dev

on:
  push:
    branches:
      - dev

jobs:
  deploy-dev:
    runs-on: ubuntu-latest
    name: Deploy to dev
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build && bun run gen-client-path

      - name: Build screens
        env:
          BASE_URL: https://front-dev.tachiiri.workers.dev
          BUILD_TOKEN: ${{ secrets.BUILD_SCREENS_TOKEN }}
        run: bun run build-screens

      # TURNSTILE_SECRET_KEY はデプロイで set しない。secret-DB（secrets-dev）を source of truth とし、
      # backend の POST /api/v1/secrets/sync/worker で front-dev worker に注入・永続させる（変更時のみ再 sync）。

      - name: Deploy to dev
        run: bunx wrangler deploy --env dev
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_DEPLOYMENT_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
