name: Deploy Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    name: Deploy to Production
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build && bun run gen-client-path

      - name: Build screens
        env:
          BASE_URL: https://front-production.tachiiri.workers.dev
          BUILD_TOKEN: ${{ secrets.BUILD_SCREENS_TOKEN }}
        run: bun run build-screens

      # TURNSTILE_SECRET_KEY は secret-DB（secrets-production）管理へ移行済み。
      # backend の sync/worker で注入・永続するため、デプロイで set しない。

      - name: Deploy to production
        run: bunx wrangler deploy --env production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_DEPLOYMENT_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
