name: Deploy Stage

on:
  push:
    branches:
      - stage

jobs:
  deploy-stage:
    runs-on: ubuntu-latest
    name: Deploy to stage
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build && bun run gen-client-path

      - name: Build screens
        continue-on-error: true
        env:
          BASE_URL: https://front-stage.tachiiri.workers.dev
          BUILD_TOKEN: ${{ secrets.BUILD_SCREENS_TOKEN }}
        run: bun run build-screens

      - name: Set secrets (stage)
        run: echo "$SECRET" | bunx wrangler secret put TURNSTILE_SECRET_KEY --env stage
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_DEPLOYMENT_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          SECRET: ${{ secrets.TURNSTILE_SECRET_KEY_STAGE }}

      - name: Deploy to stage
        run: bunx wrangler deploy --env stage
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_DEPLOYMENT_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
