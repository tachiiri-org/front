name: Set Turnstile Secrets

on:
  workflow_dispatch:

jobs:
  set-secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10
      - run: bun install
      - name: Set dev secret
        run: echo "$SECRET" | bunx wrangler secret put TURNSTILE_SECRET_KEY --env dev
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_DEPLOYMENT_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          SECRET: ${{ secrets.TURNSTILE_SECRET_KEY_DEV }}
      - name: Set stage secret
        run: echo "$SECRET" | bunx wrangler secret put TURNSTILE_SECRET_KEY --env stage
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_DEPLOYMENT_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          SECRET: ${{ secrets.TURNSTILE_SECRET_KEY_STAGE }}
      - name: Set production secret
        run: echo "$SECRET" | bunx wrangler secret put TURNSTILE_SECRET_KEY --env production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_DEPLOYMENT_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          SECRET: ${{ secrets.TURNSTILE_SECRET_KEY_PRODUCTION }}
